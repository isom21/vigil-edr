syntax = "proto3";

package edr.v1;

import "google/protobuf/timestamp.proto";
import "edr/v1/common.proto";

// Top-level event envelope. ECS-aligned field naming where practical.
// One EndpointEvent per observable action (process exec, file create, etc.).
message EndpointEvent {
  // Envelope metadata
  string event_id = 1;                       // ULID, agent-generated
  google.protobuf.Timestamp event_created = 2;
  google.protobuf.Timestamp event_observed = 3; // when agent saw it
  EventKind kind = 4;
  repeated EventCategory category = 5;
  string action = 6;                          // ECS event.action, e.g. "process_started"
  string outcome = 7;                         // ECS event.outcome: "success"|"failure"|"unknown"

  // Identity
  string host_id = 10;
  string agent_id = 11;
  string agent_version = 12;

  // Payload — exactly one of these is set per kind.
  oneof payload {
    ProcessEvent process = 20;
    FileEvent file = 21;
    ImageLoadEvent image_load = 22;
    ThreadEvent thread = 23;
    RegistryEvent registry = 24;     // Windows only
    NetworkEvent network = 25;
    ScanEvent scan = 26;             // YARA/IOC scan match emitted by agent
    DnsEvent dns = 27;               // M10.b: DNS query/response observation
    AgentTamperEvent agent_tamper = 28; // M12.a/b: agent self-protection tamper alert
    QuarantineCompletedEvent quarantine_completed = 29; // M20.c: agent reports quarantine / release outcome
    AuthEvent auth = 31;             // Phase 2 #2.4: logon / kerberos / sshd auth event
  }

  // Optional labels propagated from rule evaluation (set on alert path).
  map<string, string> labels = 30;
}

enum EventKind {
  EVENT_KIND_UNSPECIFIED = 0;
  EVENT_KIND_EVENT = 1;       // ordinary telemetry
  EVENT_KIND_ALERT = 2;       // agent-side rule match
  EVENT_KIND_STATE = 3;       // host state snapshot
}

enum EventCategory {
  EVENT_CATEGORY_UNSPECIFIED = 0;
  EVENT_CATEGORY_PROCESS = 1;
  EVENT_CATEGORY_FILE = 2;
  EVENT_CATEGORY_NETWORK = 3;
  EVENT_CATEGORY_REGISTRY = 4;
  EVENT_CATEGORY_AUTHENTICATION = 5;
  EVENT_CATEGORY_INTRUSION_DETECTION = 6;
}

// ----- Process -----

message ProcessEvent {
  ProcessKey process = 1;
  ProcessKey parent = 2;          // unset for the boot process
  string executable = 3;          // ECS process.executable (full path)
  string name = 4;                // basename
  string command_line = 5;
  repeated string args = 6;
  Hash hash = 7;
  User user = 8;
  IntegrityLevel integrity = 9;   // Windows; UNSPEC on Linux
  string working_directory = 10;
  google.protobuf.Timestamp start = 11;
  google.protobuf.Timestamp end = 12;        // set on EXIT events
  int32 exit_code = 13;                       // set on EXIT events
  ProcessAction action = 14;
  // Phase 2 #2.9: container telemetry. Populated on Linux when the
  // process is running inside a container; empty/UNKNOWN on bare metal
  // and on Windows (no container enrichment there yet).
  string container_id = 15;        // ECS container.id (full id; short id is derived in the UI)
  string container_image = 16;     // ECS container.image.name (best-effort, may be empty when the runtime API is unavailable)
  ContainerRuntime container_runtime = 17;
}

enum ContainerRuntime {
  CONTAINER_RUNTIME_UNKNOWN = 0;
  CONTAINER_RUNTIME_DOCKER = 1;
  CONTAINER_RUNTIME_CONTAINERD = 2;
  CONTAINER_RUNTIME_CRI_O = 3;
  CONTAINER_RUNTIME_PODMAN = 4;
}

enum ProcessAction {
  PROCESS_ACTION_UNSPECIFIED = 0;
  PROCESS_ACTION_START = 1;
  PROCESS_ACTION_EXIT = 2;
  PROCESS_ACTION_BLOCKED = 3;     // start denied by agent
  PROCESS_ACTION_KILLED = 4;      // killed by agent response action
}

enum IntegrityLevel {
  INTEGRITY_LEVEL_UNSPECIFIED = 0;
  INTEGRITY_LEVEL_UNTRUSTED = 1;
  INTEGRITY_LEVEL_LOW = 2;
  INTEGRITY_LEVEL_MEDIUM = 3;
  INTEGRITY_LEVEL_HIGH = 4;
  INTEGRITY_LEVEL_SYSTEM = 5;
  INTEGRITY_LEVEL_PROTECTED = 6;
}

// ----- File -----

message FileEvent {
  ProcessKey process = 1;         // actor
  string path = 2;
  string name = 3;
  uint64 size = 4;
  Hash hash = 5;                  // populated when agent hashed the file
  FileAction action = 6;
  google.protobuf.Timestamp ctime = 7;
  google.protobuf.Timestamp mtime = 8;
  string target_path = 9;          // for renames
}

enum FileAction {
  FILE_ACTION_UNSPECIFIED = 0;
  FILE_ACTION_CREATE = 1;
  FILE_ACTION_WRITE = 2;
  FILE_ACTION_DELETE = 3;
  FILE_ACTION_RENAME = 4;
  FILE_ACTION_OPEN = 5;
  FILE_ACTION_BLOCKED = 6;
}

// ----- Image load (DLL/SO/EXE map) -----

message ImageLoadEvent {
  ProcessKey process = 1;
  string path = 2;
  Hash hash = 3;
  uint64 base_address = 4;
  uint64 size = 5;
  bool signed = 6;
  string signer = 7;
}

// ----- Thread -----

message ThreadEvent {
  ProcessKey process = 1;          // owning process
  ProcessKey source = 2;           // creator (different from process => remote thread)
  uint64 tid = 3;
  uint64 start_address = 4;
  ThreadAction action = 5;
}

enum ThreadAction {
  THREAD_ACTION_UNSPECIFIED = 0;
  THREAD_ACTION_CREATE = 1;
  THREAD_ACTION_REMOTE_CREATE = 2;
  THREAD_ACTION_TERMINATE = 3;
}

// ----- Registry (Windows) -----

message RegistryEvent {
  ProcessKey process = 1;
  string hive = 2;        // HKLM, HKCU, ...
  string path = 3;
  string value_name = 4;
  string value_type = 5;  // REG_SZ, REG_DWORD, ...
  bytes value_data = 6;
  RegistryAction action = 7;
}

enum RegistryAction {
  REGISTRY_ACTION_UNSPECIFIED = 0;
  REGISTRY_ACTION_KEY_CREATE = 1;
  REGISTRY_ACTION_KEY_DELETE = 2;
  REGISTRY_ACTION_VALUE_SET = 3;
  REGISTRY_ACTION_VALUE_DELETE = 4;
}

// ----- Network -----

message NetworkEvent {
  ProcessKey process = 1;
  string transport = 2;          // tcp|udp
  string source_ip = 3;
  uint32 source_port = 4;
  string destination_ip = 5;
  uint32 destination_port = 6;
  NetworkDirection direction = 7;
  NetworkAction action = 8;
}

enum NetworkDirection {
  NETWORK_DIRECTION_UNSPECIFIED = 0;
  NETWORK_DIRECTION_INBOUND = 1;
  NETWORK_DIRECTION_OUTBOUND = 2;
}

enum NetworkAction {
  NETWORK_ACTION_UNSPECIFIED = 0;
  NETWORK_ACTION_CONNECT = 1;
  NETWORK_ACTION_ACCEPT = 2;
  NETWORK_ACTION_DISCONNECT = 3;
  NETWORK_ACTION_BLOCKED = 4;
}

// ----- DNS (M10.b) -----
//
// One event per query the agent observes. The kernel-side capture
// path (M10.b-bpf) reads the DNS payload from `udp_sendmsg` to
// resolve `name` + `qtype`; reply parsing on `udp_recvmsg` fills
// `rcode` + `answers`. The userspace fallback path
// (M10.b-resolved) tails systemd-resolved's journald output and
// fills the same fields with whatever resolution the resolver
// performed.
message DnsEvent {
  ProcessKey process = 1;
  string name = 2;            // queried hostname (FQDN, no trailing dot)
  uint32 qtype = 3;            // DNS qtype: 1=A, 28=AAAA, 5=CNAME, ...
  uint32 rcode = 4;            // DNS rcode: 0=NoError, 3=NXDOMAIN, ...
  repeated string answers = 5; // resolved IPs / CNAMEs, best-effort
  string resolver = 6;         // resolver IP the query was sent to (when known)
  DnsAction action = 7;
}

enum DnsAction {
  DNS_ACTION_UNSPECIFIED = 0;
  DNS_ACTION_QUERY = 1;        // outbound question
  DNS_ACTION_ANSWER = 2;       // matched response observed
  DNS_ACTION_BLOCKED = 3;      // resolver returned NXDOMAIN at agent's request
}

// ----- Scan match (agent-side YARA / IOC hit) -----

message ScanEvent {
  ProcessKey process = 1;       // optional context (memory scan target)
  string target_path = 2;        // for file scans
  ScanType type = 3;
  string rule_id = 4;            // server-issued rule id
  string rule_name = 5;
  string match_detail = 6;       // YARA: matched string ids; IOC: matched value
  RuleAction action_taken = 7;
}

enum ScanType {
  SCAN_TYPE_UNSPECIFIED = 0;
  SCAN_TYPE_YARA_FILE = 1;
  SCAN_TYPE_YARA_MEMORY = 2;
  SCAN_TYPE_IOC_HASH = 3;
  SCAN_TYPE_IOC_PATH = 4;
  SCAN_TYPE_IOC_NAME = 5;
}

// ----- Agent tamper (M12) -----
//
// Emitted by the agent itself when it detects something has tampered
// with its own state. This is not a regular telemetry event — it
// always lands in the alert path on the manager (kind=ALERT) so the
// SOC sees it immediately, even if the rest of the agent is degraded.
message AgentTamperEvent {
  TamperKind kind = 1;
  string target_path = 2;     // path tampered with (binary, config, BPF prog name)
  string expected_hash = 3;    // sha256 hex (where applicable)
  string actual_hash = 4;      // sha256 hex (where applicable)
  string detail = 5;           // freeform context for triage
}

enum TamperKind {
  TAMPER_KIND_UNSPECIFIED = 0;
  TAMPER_KIND_BINARY_MISMATCH = 1;   // M12.a: /proc/self/exe drifted from manifest
  TAMPER_KIND_CONFIG_MISMATCH = 2;   // M12.a: agent.toml drifted from baseline
  TAMPER_KIND_BPF_DETACHED = 3;      // M12.b: expected BPF program no longer attached
  TAMPER_KIND_BPF_MAP_MISSING = 4;   // M12.b: pinned map disappeared from bpffs
}

// ----- Quarantine outcome (M20.c) -----
//
// Sent by the agent after a QuarantineFileCmd or ReleaseQuarantineCmd
// completes. The manager uses the sha256 + status to keep the
// quarantined_files row in sync with the on-disk state.
message QuarantineCompletedEvent {
  // What just happened.
  QuarantineOutcome outcome = 1;
  // Hex SHA-256 of the bytes that landed in (or left) quarantine.
  string sha256 = 2;
  // The path on the endpoint before quarantine (for QUARANTINED) or
  // the path the file was restored to (for RELEASED).
  string path = 3;
  // Total bytes of the quarantined content.
  uint64 size_bytes = 4;
  // True if the agent removed the file at `path` after copying it
  // into quarantine. Always false for RELEASED.
  bool deleted_original = 5;
}

enum QuarantineOutcome {
  QUARANTINE_OUTCOME_UNSPECIFIED = 0;
  QUARANTINE_OUTCOME_QUARANTINED = 1;
  QUARANTINE_OUTCOME_RELEASED = 2;
  QUARANTINE_OUTCOME_FAILED = 3;
}

// ----- Authentication event (Phase 2 #2.4) -----
//
// Unified shape for Windows Security-Auditing 4624/4625/4768/4769 and
// Linux auditd USER_LOGIN / USER_AUTH / sshd lines. Not every collector
// fills every field — the ECS mapping treats missing fields as absent
// rather than empty.
message AuthEvent {
  AuthKind auth_kind = 1;
  AuthResult result = 2;
  string user = 3;             // logon principal
  string user_domain = 4;       // Windows NETBIOS / AD domain; empty on Linux
  string source_ip = 5;         // IpAddress (4624/4625) or sshd "from <ip>"
  string target_host = 6;       // workstation / hostname the auth landed on
  string target_user = 7;       // target principal for KERBEROS_TGS / su-style elevation
  int32 logon_type = 8;          // Windows LogonType (2 interactive, 3 network, 10 RDP, ...)
  string ticket_kind = 9;        // Kerberos: TGT / TGS / pre-auth
  string service_name = 10;      // Kerberos service (e.g. krbtgt, host/<spn>)
  string failure_reason = 11;    // SubStatus translation or sshd reason line
  uint32 event_id_raw = 12;      // 4624 / 4625 / 4768 / 4769 for forensics
}

enum AuthKind {
  AUTH_KIND_UNSPECIFIED = 0;
  AUTH_KIND_LOGON = 1;            // 4624 / 4625 / auditd USER_LOGIN / sshd Accepted/Failed
  AUTH_KIND_LOGOFF = 2;           // 4634 / 4647
  AUTH_KIND_KERBEROS_TGT = 3;     // 4768 (TGT request)
  AUTH_KIND_KERBEROS_TGS = 4;     // 4769 (service ticket request)
  AUTH_KIND_NT_LOGON = 5;         // 4776 (NTLM credential validation)
}

enum AuthResult {
  AUTH_RESULT_UNSPECIFIED = 0;
  AUTH_RESULT_SUCCESS = 1;
  AUTH_RESULT_FAILURE = 2;
  AUTH_RESULT_UNKNOWN = 3;
}
