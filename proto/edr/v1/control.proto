syntax = "proto3";

package edr.v1;

import "google/protobuf/timestamp.proto";
import "edr/v1/common.proto";
import "edr/v1/events.proto";

// Bidirectional stream between agent and manager.
//
// Agent connects (mTLS, client cert from enrollment), opens HostStream,
// then sends ClientMessage values; the manager replies with ServerMessage
// values whenever it has commands or config to deliver.
service AgentService {
  // Long-lived bidi stream. One per agent.
  rpc HostStream(stream ClientMessage) returns (stream ServerMessage);

  // One-shot: agent submits CSR with enrollment token, gets cert back.
  rpc Enroll(EnrollRequest) returns (EnrollResponse);

  // M23.c: Jobs engine. Agent asks for a short-lived presigned MinIO
  // PUT URL when it needs to upload an artifact (host_sweep emits many
  // files of unknown count up front, so we don't pre-allocate URLs in
  // RunJobCmd). Upload happens out-of-band over HTTPS to MinIO; once
  // the PUT succeeds the agent sends a JobArtifactReport on the
  // existing stream so the manager records the metadata.
  rpc RequestArtifactUpload(ArtifactUploadRequest) returns (ArtifactUploadGrant);

  // Phase 1 #1.4: live-response remote shell. Analyst-or-admin opens a
  // terminal session against a visible host; the agent allocates a
  // PTY (forkpty on Linux, ConPTY on Windows), runs the host shell,
  // and proxies stdin/stdout/stderr + resize across the bidi stream.
  // Manager exposes a WebSocket relay so the UI's xterm.js renders
  // the session live. Every byte is audit-logged in coalesced batches
  // (per N bytes or N seconds, whichever first) under
  // `host.terminal.io`. Auto-closes on idle (`VIGIL_TERMINAL_IDLE_S`,
  // default 300s) or stream close.
  rpc TerminalStream(stream TerminalClientMessage) returns (stream TerminalServerMessage);
}

// =============== Agent → Manager ===============

message ClientMessage {
  oneof payload {
    Hello hello = 1;
    EventBatch events = 2;
    Heartbeat heartbeat = 3;
    CommandResult command_result = 4;
    ScanReport scan_report = 5;
    // M23.c: Jobs progress + artifact reports. JobCompleted is folded
    // into CommandResult (RUN_JOB rides the existing Command path)
    // — these two carry the *richer* mid-flight info that doesn't fit
    // a CommandResult.
    JobProgress job_progress = 6;
    JobArtifactReport job_artifact = 7;
    // Phase 4 #4.5: agent observed a touch on a deployed honeytoken
    // (fake file / fake regkey / fake creds). High-signal — the
    // manager raises a critical alert via the synthetic
    // honeytoken-hit rule.
    HoneytokenHit honeytoken_hit = 8;
  }
}

message Hello {
  Host host = 1;
  string boot_time_iso = 2;
  uint64 last_event_id_seen = 3;   // for resume semantics if backend-side journal exists
  // M9.5 compatibility matrix. Manager rejects the connection with a
  // clear error if the agent's protocol_version is older than the
  // manager's minimum supported version. Both sides bump together.
  uint32 protocol_version = 4;
  string capabilities = 5;          // comma-separated feature flags ("self_protect_v1,spool_v1,...")
}

message EventBatch {
  repeated EndpointEvent events = 1;
  string batch_id = 2;
  uint64 first_seq = 3;
  uint64 last_seq = 4;
}

message Heartbeat {
  google.protobuf.Timestamp ts = 1;
  AgentMetrics metrics = 2;
}

message AgentMetrics {
  double cpu_percent = 1;
  uint64 memory_bytes = 2;
  uint64 events_emitted = 3;
  uint64 events_dropped = 4;
  uint64 spool_bytes = 5;          // disk-backed event spool size

  // M9.4 self-diagnostics. Agent populates these from kernel-side
  // counters so the manager can render fleet health without polling
  // each host individually.
  uint64 spool_entries = 6;
  uint64 ringbuf_drops = 7;        // events lost at the kernel ring (BPF EVENTS_DROPPED)
  uint32 self_protection_active = 8;  // 1 if M7.1/M7.2 self-protection hooks attached
  uint64 last_event_age_seconds = 9;  // wall-clock since last event emission (idle hosts -> high)
  uint32 collector_mode = 10;      // 0=unknown, 1=ebpf, 2=proc-poll, 3=driver, 4=etw
}

message CommandResult {
  string command_id = 1;
  bool success = 2;
  string error = 3;
  bytes payload = 4;               // command-specific
}

message ScanReport {
  string scan_id = 1;
  ScanStatus status = 2;
  uint64 items_scanned = 3;
  uint64 matches = 4;
}

enum ScanStatus {
  SCAN_STATUS_UNSPECIFIED = 0;
  SCAN_STATUS_RUNNING = 1;
  SCAN_STATUS_COMPLETED = 2;
  SCAN_STATUS_FAILED = 3;
  SCAN_STATUS_CANCELLED = 4;
}

// =============== Manager → Agent ===============

message ServerMessage {
  oneof payload {
    PolicyUpdate policy = 1;
    RuleSync rules = 2;
    Command command = 3;
    Pong pong = 4;
  }
}

message PolicyUpdate {
  string policy_id = 1;
  uint64 policy_version = 2;
  // Per-rule overrides (action, enabled). Full rule bodies arrive in RuleSync.
  repeated PolicyRuleEntry entries = 3;
}

message PolicyRuleEntry {
  string rule_id = 1;
  RuleAction action = 2;
  bool enabled = 3;
}

message RuleSync {
  uint64 rules_version = 1;
  repeated YaraRule yara = 2;
  repeated IocRule iocs = 3;
  // Sigma rules are evaluated server-side (Flink) — not synced to agents in v1.
}

message YaraRule {
  string id = 1;
  string name = 2;
  string source = 3;        // YARA source text
  Severity severity = 4;
  RuleAction action = 5;
}

message IocRule {
  string id = 1;
  string name = 2;
  IocKind kind = 3;
  repeated string values = 4;   // hashes / paths / names; normalized server-side
  Severity severity = 5;
  RuleAction action = 6;
}

enum IocKind {
  IOC_KIND_UNSPECIFIED = 0;
  IOC_KIND_HASH_SHA256 = 1;
  IOC_KIND_HASH_MD5 = 2;
  IOC_KIND_HASH_SHA1 = 3;
  IOC_KIND_FILENAME = 4;
  IOC_KIND_FILEPATH = 5;
}

message Command {
  string command_id = 1;
  google.protobuf.Timestamp issued_at = 2;
  oneof body {
    KillProcessCmd kill = 10;
    ScanFileCmd scan_file = 11;
    ScanMemoryCmd scan_memory = 12;
    IsolateHostCmd isolate = 13;
    UpdateAgentCmd update = 14;
    BlockProcessCmd block_process = 15;
    BlockFileCmd block_file = 16;
    UnblockProcessCmd unblock_process = 17;
    UnblockFileCmd unblock_file = 18;
    QuarantineFileCmd quarantine_file = 19;
    ReleaseQuarantineCmd release_quarantine = 20;
    RunJobCmd run_job = 21;
    AllowlistSyncCmd allowlist_sync = 22;
    DnsBlockSyncCmd dns_block_sync = 23;
    // Phase 3 #3.10: device control / USB block. Next free slot = 24.
    DeviceControlSyncCmd device_control_sync = 24;
    // Phase 4 #4.5: deploy a batch of honeytokens (fake creds, fake
    // files, fake registry keys). The agent applies the OS-specific
    // primitive per spec and tags it with the operator-supplied id
    // so the hit path can correlate back to the source row.
    DeployHoneytokenCmd deploy_honeytoken = 25;
  }
}

// Phase 2 #2.8: application allowlist mode the kernel-side enforcer
// uses. OFF: the agent ignores the allowlist entirely. LEARN: the
// agent observes process_started SHA-256s and ships them to the
// manager (no deny path runs). ENFORCE: bprm_check_security looks up
// the binary's SHA-256 in the synced map and returns -EPERM on miss.
enum AllowlistMode {
  ALLOWLIST_MODE_OFF = 0;
  ALLOWLIST_MODE_LEARN = 1;
  ALLOWLIST_MODE_ENFORCE = 2;
}

// Sync the full allowlist down to the agent. The manager re-sends the
// complete hash set on every change rather than incremental diffs —
// the map's capacity (8192 entries) bounds the wire size at ~256 KiB,
// well inside the bidi stream, and a "set" semantics is simpler to
// reason about than a sequence of add/remove deltas.
message AllowlistSyncCmd {
  // raw 32-byte SHA-256 digests (NOT hex). Empty when mode == OFF.
  repeated bytes hashes = 1;
  AllowlistMode mode = 2;
}

// Phase 2 #2.12: DNS sinkhole / domain block list.
//
// Whole-list resync (not incremental). The manager sends the agent the
// current effective set for its host every time the operator edits the
// list, and the agent replaces its kernel-side map atomically.
//
// `block_domains` are dropped outright (kernel returns -EPERM on Linux /
// FWP_ACTION_BLOCK on Windows). `sinkhole_domains` are also dropped
// today; the slot is reserved so the agent can later route those queries
// to a local sinkhole IP (Phase 3) without a wire change.
//
// Domain names are lowercase, no trailing dot.
message DnsBlockSyncCmd {
  repeated string block_domains = 1;
  repeated string sinkhole_domains = 2;
}

// Phase 3 #3.10: USB / removable-device control policy.
//
// Whole-policy push (not incremental). The manager materialises the
// effective per-host-group device policy (globals + group entries) and
// ships it down on every operator edit. Agent dispatches by `kind`:
//
// * `usb_block` — deny all USB devices except VID/PID pairs in
//  `allowed_vids` × `allowed_pids` (same-index exception entries).
// * `usb_read_only` — bind usb-storage / Windows removable storage as
//  read-only; new mounts inherit `ro`.
// * `usb_allow_only` — default-deny; only the VID/PID list is allowed.
//
// `enabled=false` is a tombstone: the agent should clear any prior
// policy file/registry value rather than re-applying.
message DeviceControlSyncCmd {
  string kind = 1;
  repeated string allowed_vids = 2;
  repeated string allowed_pids = 3;
  bool enabled = 4;
}

// M23.c: Jobs engine — generic envelope. The agent uses `job_kind`
// (matches the JobKind enum on the manager) to pick a handler from
// its dispatch table; `parameters_json` carries kind-specific config.
// Keeping the wire layout generic means new job kinds don't need a
// new proto message.
message RunJobCmd {
  string job_id = 1;
  string run_id = 2;
  string job_kind = 3;
  // JSON-encoded parameters dict. Schema is enforced at the
  // dispatcher level (Rust handlers parse with serde_json).
  string parameters_json = 4;
}

// M11.f: agent moves the file to a SYSTEM-only quarantine directory,
// SHA-256s the content (or recomputes if cached), and reports the
// digest back. `delete_original` controls whether the original path
// is left in place (false) or removed after copy (true).
message QuarantineFileCmd {
  string path = 1;
  bool delete_original = 2;
}

// M20.c: restore a previously quarantined file. The agent copies
// {state_dir}/quarantine/<sha256>.bin back to `target_path` (which
// defaults to the original_path the agent recorded on quarantine),
// removes the quarantine copy, and emits a QuarantineCompletedEvent
// with `released=true` so the manager can flip the row to released.
message ReleaseQuarantineCmd {
  string sha256 = 1;
  // Optional override. Empty string = restore to the original path
  // the agent remembers.
  string target_path = 2;
}

message KillProcessCmd {
  ProcessKey target = 1;
  bool force = 2;
}

message ScanFileCmd {
  string path = 1;
  bool recursive = 2;
  repeated string yara_rule_ids = 3;   // empty = all enabled
}

message ScanMemoryCmd {
  ProcessKey target = 1;                // empty = all
  repeated string yara_rule_ids = 2;
}

message IsolateHostCmd {
  bool isolate = 1;                     // true = isolate, false = restore
  repeated string allowlist_ips = 2;    // ips reachable while isolated (manager itself)
}

message UpdateAgentCmd {
  string version = 1;
  string download_url = 2;              // signed URL
  Hash expected_hash = 3;
}

// Block-list management commands (M5.2 driver counterparts).
message BlockProcessCmd {
  string pattern = 1;                   // case-insensitive substring of the
                                        // process image path; matched at
                                        // PsCreateProcessNotify time.
}

message BlockFileCmd {
  string pattern = 1;                   // case-insensitive substring of the
                                        // file path; matched at IRP_MJ_CREATE
                                        // pre-op.
}

message UnblockProcessCmd {
  string pattern = 1;
}

message UnblockFileCmd {
  string pattern = 1;
}

message Pong {
  google.protobuf.Timestamp ts = 1;
}

// =============== Enrollment ===============

message EnrollRequest {
  string enrollment_token = 1;          // one-time token issued in manager UI
  string hostname = 2;
  OsInfo os = 3;
  string agent_version = 4;
  bytes csr_pem = 5;                    // PKCS#10 CSR generated on the agent
}

message EnrollResponse {
  string host_id = 1;                   // assigned by manager
  bytes client_cert_pem = 2;            // signed by manager CA
  bytes ca_chain_pem = 3;               // CA cert(s) for trust anchor
  google.protobuf.Timestamp cert_not_after = 4;
}

// =============== Jobs engine (M23) ===============

enum JobRunStatus {
  JOB_RUN_STATUS_UNSPECIFIED = 0;
  JOB_RUN_STATUS_DISPATCHED = 1;
  JOB_RUN_STATUS_RUNNING = 2;
  JOB_RUN_STATUS_COMPLETED = 3;
  JOB_RUN_STATUS_FAILED = 4;
  JOB_RUN_STATUS_CANCELED = 5;
  JOB_RUN_STATUS_TIMEOUT = 6;
}

// Mid-flight progress ping from agent to manager. Optional — only
// long-running jobs (yara_fs_scan, host_sweep) need it; one-shot kinds
// (kill_process) can skip straight to CommandResult.
message JobProgress {
  string run_id = 1;
  JobRunStatus status = 2;
  uint32 progress_pct = 3;             // 0..100
  string progress_message = 4;         // optional human-readable note
  string error = 5;                    // populated only on FAILED
}

// Agent reports an artifact upload completed. The agent first PUT the
// blob to MinIO using a presigned URL from RequestArtifactUpload; this
// message tells the manager to write the JobArtifact row.
message JobArtifactReport {
  string run_id = 1;
  string bucket = 2;
  string object_key = 3;
  // Artifact taxonomy. Matches JobArtifactKind on the manager:
  //   json | file | yara_matches | ioc_matches | hash_list |
  //   shell_output | diagnostic_bundle.
  string artifact_kind = 4;
  uint64 size_bytes = 5;
  string sha256 = 6;
  // JSON-encoded metadata (e.g. {"file_count": 12, "match_count": 3}).
  string metadata_json = 7;
}

// Ask the manager for a presigned PUT URL. Returned URL is short-lived
// (default 15 min) — agents should PUT immediately.
message ArtifactUploadRequest {
  string run_id = 1;
  string original_filename = 2;
  // Hint for the manager so it can validate quota / pick the right
  // bucket. Required.
  string artifact_kind = 3;
  uint64 expected_size_bytes = 4;
}

message ArtifactUploadGrant {
  string url = 1;                      // HTTPS PUT URL
  string bucket = 2;
  string object_key = 3;
  google.protobuf.Timestamp expires_at = 4;
  // Required HTTP headers the agent must send with the PUT. MinIO's
  // presigned URL accepts a content-length and standard headers; this
  // field exists so we can extend (e.g. SSE-C) without re-rolling
  // the protocol.
  map<string, string> required_headers = 5;
}

// =============== Deception / honeytokens (Phase 4 #4.5) ===============

// One decoy artifact the agent should plant. `kind` selects the OS
// primitive (`fake_file` / `fake_regkey` / `creds_in_lsass`); `payload`
// is the bytes to write (for files: the file body; for regkeys: a
// little JSON the operator wants to see show up in attacker eyes).
// `target_path` is the filesystem path (Linux/Windows) or registry
// path (Windows) the spec materialises at.
message HoneytokenSpec {
  string id = 1;
  string kind = 2;
  string name = 3;
  bytes payload = 4;
  string target_path = 5;
}

message DeployHoneytokenCmd {
  repeated HoneytokenSpec specs = 1;
}

// Agent observed a touch on a deployed honeytoken. The tuple
// (id, pid, executable) is enough for SOC analysts to pivot to the
// host's process tree + the operator-visible token name.
message HoneytokenHit {
  string honeytoken_id = 1;
  uint64 process_pid = 2;
  string process_executable = 3;
  google.protobuf.Timestamp hit_at = 4;
}

// =============== Live response remote shell (Phase 1 #1.4) ===============

// Analyst → agent.
message TerminalClientMessage {
  oneof payload {
    TerminalOpen open = 1;     // first message; allocates the PTY
    TerminalIO input = 2;      // stdin bytes
    TerminalResize resize = 3; // window-size update
    TerminalClose close = 4;   // graceful shutdown from the operator
  }
}

// Agent → analyst.
message TerminalServerMessage {
  oneof payload {
    TerminalIO output = 1;     // stdout/stderr bytes (multiplexed)
    TerminalExit exit = 2;     // shell exited / session ended
  }
}

// Opening message from the operator. `host_id` is the target;
// `session_id` is allocated by the manager (it mints a short-lived
// session token that the WebSocket relay validates before opening the
// gRPC bidi stream). cols/rows are the initial TTY dimensions.
message TerminalOpen {
  string host_id = 1;
  string session_id = 2;
  uint32 cols = 3;
  uint32 rows = 4;
}

// stdin/stdout/stderr payload. Direction is implied by which oneof slot
// the message landed in (input vs output) on TerminalClient/ServerMessage.
message TerminalIO {
  bytes data = 1;
}

// SIGWINCH-equivalent — operator's xterm.js was resized.
message TerminalResize {
  uint32 cols = 1;
  uint32 rows = 2;
}

// Operator-initiated close. `reason` is a human-readable string
// surfaced in the audit log; the agent should still drain the PTY
// output before exiting.
message TerminalClose {
  string reason = 1;
}

// Agent-initiated terminal end. `exit_code` is the shell's exit
// status (negative if the agent couldn't capture it); `reason` is a
// short tag like "shell_exit", "idle_timeout", "stream_close".
message TerminalExit {
  int32 exit_code = 1;
  string reason = 2;
}
