# Frontend gates: tsc + eslint + prettier + npm audit.

name: frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    name: tsc + eslint + prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npx eslint --max-warnings=0 src
      - run: npx prettier --check src
      # Regression guard for LIVE-3 / CODE-301: the bare `tsc --noEmit`
      # silently checks zero files when run against the root tsconfig
      # (which has `"files": []`). Inject a deliberately broken export
      # and confirm `npm run typecheck` actually fails.
      - name: typecheck gate must reject broken code
        run: bash scripts/verify-typecheck-gate.sh

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Production-only audit: dev tooling vulns aren't deploy-blocking.
      - run: npm audit --omit=dev --audit-level=high
