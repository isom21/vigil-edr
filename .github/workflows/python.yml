# Python gates: backend (FastAPI manager + workers).
#
# Lints with ruff, types with pyright, vulnerabilities with pip-audit.
# Tests run via pytest with testcontainers for Postgres + Kafka + OpenSearch
# in `backend.yml` (separated because the test job needs Docker).

name: python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: ruff + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      # M-lint-fix (MEDIUM #11): scope the gate to the whole backend
      # tree (not just app/). tests/, scripts/, alembic env, etc.
      # were outside the gate before; without that, lint drift
      # accumulated there. extend-exclude in pyproject.toml carves out
      # alembic/versions/* and proto_gen/*.
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - run: pip install pyright
      # backend/app/proto_gen/ is not checked in; generate it from
      # the .proto sources in /proto so pyright's import resolution
      # succeeds for `from app.proto_gen.edr.v1 import ...`.
      - name: generate proto bindings
        working-directory: ${{ github.workspace }}
        run: make proto-python
      # M-lint-fix (MEDIUM #12): pyright was previously invoked on
      # `pyright app` only — full-tree runs took >8 min locally. The
      # `pyrightconfig.json` in this dir scopes the check to
      # `app + scripts + tests` and excludes proto_gen / .venv /
      # alembic/versions so it finishes inside 60s.
      - run: pyright

  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # GH-hosted setup-python ships pip 24.0, which has 4 known CVEs
      # (CVE-2025-8869, CVE-2026-1703, CVE-2026-3219, CVE-2026-6357).
      # Upgrade before installing anything else so pip-audit doesn't
      # flag the toolchain we just used to install our deps.
      - run: python -m pip install --upgrade pip
      - run: pip install pip-audit
      # Install our project so pip-audit sees our deps via the resolved env.
      - run: pip install -e '.[dev]'
      # CVE-2025-69872 / GHSA-w8v5-vhqr-4h9v is `diskcache` 5.6.3,
      # pulled transitively by pySigma. No fix released upstream as
      # of 2026-05. Both forms listed because pip-audit's reported ID
      # depends on the vulnerability service it queries.
      - run: pip-audit --skip-editable --ignore-vuln CVE-2025-69872 --ignore-vuln GHSA-w8v5-vhqr-4h9v
