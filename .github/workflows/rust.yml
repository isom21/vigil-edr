# Rust gates: agent-core, agent-linux, agent-windows.
#
# Linux jobs build and test on ubuntu-latest. The Windows agent is checked
# only via `cargo check --target x86_64-pc-windows-msvc` on Linux (build
# requires the MSVC toolchain on a Windows runner; gating that is M9
# follow-up once we have a self-hosted lab-windows runner).
#
# Caching: keys hash Cargo.lock so cache invalidates on dep updates.

name: rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  check:
    # Wider net than clippy. Builds every crate in the workspace so
    # an unresolved import or missing-dep regression — like the one
    # the reviewer flagged in agent-linux/src/command_worker.rs:29
    # against a M23.b snapshot — blocks the PR before clippy is even
    # reached. clippy is a strict superset for the crates it touches
    # but skips bins on some toolchain versions when --no-deps is set,
    # which is what let the agent-linux break through previously.
    name: cargo check (linux)
    runs-on: ubuntu-latest
    env:
      VIGIL_SKIP_EBPF_BUILD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets --all-features

  clippy:
    name: clippy (linux)
    runs-on: ubuntu-latest
    env:
      # CI just validates the user-space Rust. The eBPF C compile
      # needs bpftool + a BTF kernel, neither of which the GH
      # runner reliably provides. agent-linux/build.rs writes an
      # ELF stub so include_bytes!("vigil.bpf.o") resolves; the stub
      # never reaches a real deployment.
      VIGIL_SKIP_EBPF_BUILD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features --no-deps -- -D warnings

  test:
    name: test (linux)
    runs-on: ubuntu-latest
    env:
      VIGIL_SKIP_EBPF_BUILD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --no-fail-fast

  windows-check:
    name: cargo check (windows target)
    runs-on: windows-latest
    # Advisory only. aws-lc-sys (transitive via reqwest/hyper-rustls)
    # has a brittle build on GH-hosted windows runners that depends on
    # cmake/perl/nasm + a specific MSVC env. Real Windows builds run
    # on the lab-windows self-hosted runner; this job is a smoke test
    # for early signal but doesn't gate the workflow.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: ilammy/setup-nasm@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p agent-windows -p agent-core --target x86_64-pc-windows-msvc

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install --locked cargo-audit
      # Ignore list must stay in sync with deny.toml [advisories].ignore —
      # cargo-audit reads its own config, not deny.toml. See deny.toml
      # for the rationale on each entry.
      - run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2025-0057 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2025-0046 \
            --ignore RUSTSEC-2025-0118 \
            --ignore RUSTSEC-2026-0006 \
            --ignore RUSTSEC-2026-0020 \
            --ignore RUSTSEC-2026-0021 \
            --ignore RUSTSEC-2026-0085 \
            --ignore RUSTSEC-2026-0086 \
            --ignore RUSTSEC-2026-0087 \
            --ignore RUSTSEC-2026-0088 \
            --ignore RUSTSEC-2026-0089 \
            --ignore RUSTSEC-2026-0091 \
            --ignore RUSTSEC-2026-0092 \
            --ignore RUSTSEC-2026-0093 \
            --ignore RUSTSEC-2026-0094 \
            --ignore RUSTSEC-2026-0095 \
            --ignore RUSTSEC-2026-0096 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2025-0141

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install --locked cargo-deny
      - run: cargo deny check

  ebpf-verifier:
    # Real verifier run against the bundled vigil.bpf.o. Catches changes
    # that pass `cargo check` (which uses the stub from
    # VIGIL_SKIP_EBPF_BUILD=1) but would fail at kernel program-load —
    # the long-path block fix's 4 KB scratch buffer (Top-20 #5) is
    # exactly the shape of change this gate protects against.
    #
    # The job builds the real eBPF object (clang -target bpf), then
    # runs `examples/verifier_check.rs` as root. The example calls
    # `.load()` on every program (which invokes the kernel verifier)
    # without `.attach()` — so it works on the ubuntu-latest runner
    # even though the runner kernel doesn't have `bpf` in
    # `/sys/kernel/security/lsm`. Attaches are validated separately
    # in the lab on real fleet kernels.
    name: ebpf verifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install eBPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm linux-tools-common "linux-tools-$(uname -r)"
      - name: confirm BTF is exposed
        run: |
          test -r /sys/kernel/btf/vmlinux || {
            echo "/sys/kernel/btf/vmlinux missing or unreadable; CI runner kernel lacks BTF"; exit 1; }
      - name: build vigil.bpf.o
        run: bash agent-linux/ebpf/build.sh
      - name: build verifier_check example
        run: cargo build --release --example verifier_check -p agent-linux
      - name: run verifier_check (sudo — needs CAP_BPF for prog_load)
        run: sudo ./target/release/examples/verifier_check
