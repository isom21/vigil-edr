name: vigil-dev

# Local dev infrastructure for the Vigil manager.
# Usage:
#   cd deploy && docker compose up -d
#
# Services:
#   - postgres: state store (rules, alerts, hosts, users, CA)
#   - redpanda: Kafka-API-compatible broker (single node, no ZK)
#   - opensearch: telemetry + alerts index
#   - opensearch-dashboards: dev UI for OpenSearch (port 5601)
#   - flink-jobmanager / flink-taskmanager: Sigma streaming
#   - redpanda-console: dev UI for Kafka topics (port 8080)
#   - minio: S3-compatible object store for job artifacts + snapshot blobs
#   - minio-init: one-shot bucket bootstrap
#   - redis: optional HA backing store for rate-limit + alert-broker
#     + login-throttle (set VIGIL_REDIS_URL=redis://localhost:6379/0
#     on the manager to opt in; the in-memory fallback keeps working
#     when the manager runs single-instance)
#
# Backend FastAPI and frontend React run on the host (not in compose) during dev.

services:
  postgres:
    image: postgres:16-alpine
    container_name: vigil-postgres
    restart: unless-stopped
    # Bootstrap as `postgres` (the default superuser). The init script
    # mounted below provisions `vigil_manager` as a non-superuser
    # runtime role and makes it the owner of the `vigil` database.
    # Without this split, the manager's GRANT/REVOKE-based hardening
    # on audit_log (M16.a) is decorative — a superuser bypasses those
    # checks. See docs/install.md and the M16.a (fixed) migration.
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vigil_dev_postgres_password
      POSTGRES_DB: vigil
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-vigil-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vigil"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.3.1
    container_name: vigil-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
    ports:
      - "19092:19092"  # external Kafka
      - "9644:9644"    # admin
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 12

  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: vigil-redpanda-console
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: vigil-opensearch
    restart: unless-stopped
    environment:
      - cluster.name=vigil-dev
      - node.name=vigil-opensearch-0
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -q 'status'"]
      interval: 10s
      timeout: 5s
      retries: 12

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    container_name: vigil-opensearch-dashboards
    restart: unless-stopped
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  flink-jobmanager:
    image: flink:1.20.0-scala_2.12-java17
    container_name: vigil-flink-jobmanager
    restart: unless-stopped
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        rest.address: 0.0.0.0
        rest.bind-address: 0.0.0.0
    ports:
      - "8081:8081"  # Flink dashboard
    volumes:
      - flink_data:/opt/flink/data

  flink-taskmanager:
    image: flink:1.20.0-scala_2.12-java17
    container_name: vigil-flink-taskmanager
    restart: unless-stopped
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    depends_on:
      - flink-jobmanager

  # MinIO is the artifact + snapshot blob store for the Jobs engine
  # (M23). The manager hands agents short-lived presigned PUT URLs
  # for uploads and presigned GET URLs to analysts for downloads, so
  # only the manager ever holds long-lived credentials.
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: vigil-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vigil
      MINIO_ROOT_PASSWORD: vigil_dev_password
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: vigil-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 vigil vigil_dev_password &&
      mc mb --ignore-existing local/vigil-artifacts &&
      mc mb --ignore-existing local/vigil-snapshots-raw &&
      mc mb --ignore-existing local/vigil-archive &&
      mc anonymous set none local/vigil-artifacts &&
      mc anonymous set none local/vigil-snapshots-raw &&
      mc anonymous set none local/vigil-archive &&
      mc ilm rule add --expire-days 90 local/vigil-artifacts || true;
      mc ilm rule add --expire-days 30 local/vigil-snapshots-raw || true;
      echo 'minio buckets ready'
      "
    restart: "no"

  # Phase 1 #1.13: optional HA backing store. The manager defaults to
  # in-memory rate-limit + login-throttle + alert-broker state; flip
  # VIGIL_REDIS_URL=redis://localhost:6379/0 to share state across
  # multiple manager replicas behind a load balancer. Redis stays in
  # compose unconditionally so a single command brings up everything
  # an operator might want to exercise without a second
  # `docker compose up` for the HA profile.
  redis:
    image: redis:7-alpine
    container_name: vigil-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Phase 1 #1.6: dev-mode Keycloak so operators can exercise the OIDC
  # SSO flow end-to-end via `make up`. Imports the pre-baked
  # `vigil-dev` realm at startup with the confidential client
  # `vigil-manager` + a single test user. NOT for production — runs
  # without TLS and uses dev-default admin credentials.
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: vigil-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_dev_password
      KC_HTTP_PORT: "8888"
    ports:
      - "8888:8888"
    volumes:
      - ./keycloak/vigil-realm.json:/opt/keycloak/data/import/vigil-realm.json:ro

volumes:
  postgres_data:
  redpanda_data:
  opensearch_data:
  flink_data:
  minio_data:
  redis_data:
