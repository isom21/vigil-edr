# cargo-deny configuration.
#
# Three checks enabled by default:
#   advisories - flag known CVEs against the dep graph (RustSec DB)
#   licenses   - require deps to be on our allowlist
#   bans       - block specific crates / multiple-version copies
#
# Run locally with `cargo deny check`.

[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"
# Transitive unmaintained crates we can't easily upgrade away from.
# Each entry has a comment with the upstream chain we're stuck on.
ignore = [
    # `instant`: pulled in by parking_lot 0.11 -> sled 0.34. Sled 1.x
    # drops parking_lot entirely; we'll move when sled 1.x stabilises.
    "RUSTSEC-2024-0384",
    # `fxhash`: pulled in by aya 0.13 transitive. Aya 0.14 (in dev)
    # uses rustc-hash; bump when released.
    "RUSTSEC-2025-0057",
    # `rustls-pemfile`: pulled in by tonic 0.12 transitive. Tonic 0.13
    # migrates to rustls-pki-types::PemObject; bump when on tonic 0.13.
    "RUSTSEC-2025-0134",
    # `rsa` Marvin Attack — sled 0.34 transitive. No fix in 0.9.x as of
    # 2026-05; sled 1.x drops the chain. Not exploitable here: we don't
    # do RSA decryption with attacker-timed access to the agent's spool.
    "RUSTSEC-2023-0071",
    # wasmtime 29.0.1 advisories — pulled in transitively by yara-x 0.13.
    # yara-x compiles its own .yar rules (operator-authored, signed via
    # the manager), it does not execute attacker-supplied WASM. The
    # wasmtime sandbox-escape / WASI advisories don't apply to our usage.
    # Lift these once yara-x 1.x lands a release with a fixed wasmtime
    # we can adopt without API churn.
    "RUSTSEC-2025-0046", # fd_renumber panic (WASIp1)
    "RUSTSEC-2025-0118", # shared linear memory unsoundness
    "RUSTSEC-2026-0006", # f64.copysign segfault
    "RUSTSEC-2026-0020", # WASI resource exhaustion
    "RUSTSEC-2026-0021", # wasi:http/types.fields panic
    "RUSTSEC-2026-0085", # flags component-value panic
    "RUSTSEC-2026-0086", # 64-bit table Winch leak
    "RUSTSEC-2026-0087", # f64x2.splat segfault
    "RUSTSEC-2026-0088", # pooling allocator data leak
    "RUSTSEC-2026-0089", # Winch table.fill panic
    "RUSTSEC-2026-0091", # component-model string OOB
    "RUSTSEC-2026-0092", # UTF-16 misalignment panic
    "RUSTSEC-2026-0093", # UTF-16→latin1+utf16 OOB
    "RUSTSEC-2026-0094", # Winch table.grow return value
    "RUSTSEC-2026-0095", # Winch sandbox-escape memory access
    "RUSTSEC-2026-0096", # aarch64 Cranelift sandbox escape
    # Transitive unmaintained crates via wasmtime / yara-x chain.
    "RUSTSEC-2024-0436", # `paste` unmaintained (wasmtime macros)
    "RUSTSEC-2025-0141", # `bincode` 1.x unmaintained (yara-x 0.13)
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "0BSD",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.92
exceptions = []

[bans]
multiple-versions = "warn"
# Wildcard means a dep specified as `version = "*"`. Path-only deps
# (`{ path = "..." }`) without an explicit version are treated as
# wildcards by cargo-deny v0.19+; we use those for our own workspace
# crates and treat that as fine.
wildcards = "allow"
allow-wildcard-paths = true
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
