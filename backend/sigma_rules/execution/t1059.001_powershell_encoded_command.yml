title: PowerShell encoded command
id: 0a4d1f23-c001-4ec0-a5b2-4e1f5b7fb102
status: experimental
description: |
  Detects PowerShell launched with `-EncodedCommand` / `-enc`. Base64
  encoding is rarely seen in legitimate use; attackers use it to bypass
  command-line introspection.
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: edr-curated
date: 2026-05-10
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    process.name|endswith: 'powershell.exe'
    process.command_line|contains:
      - '-enc '
      - '-EncodedCommand'
  condition: selection
fields:
  - process.command_line
  - process.parent.executable
falsepositives:
  - Microsoft Endpoint Configuration Manager (rare).
level: high
