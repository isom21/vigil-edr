title: certutil used to download or decode payload
id: 24d3c159-a333-41f1-a1a6-86f198f704c8
status: experimental
description: |
  certutil.exe with `-urlcache` (download), `-decode` (base64 to bytes)
  or `-decodehex` is the canonical LOLBAS abuse of a signed Microsoft
  binary for staging T1105 — Ingress Tool Transfer or unpacking
  obfuscated payloads. Real CA workflows do exist but rarely call
  these flags from non-admin contexts.
references:
  - https://attack.mitre.org/techniques/T1059/003/
  - https://lolbas-project.github.io/lolbas/Binaries/Certutil/
author: edr-curated
date: 2026-05-13
tags:
  - attack.execution
  - attack.t1059.003
  - attack.t1105
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    process.executable|endswith: '\certutil.exe'
    process.command_line|contains:
      - '-urlcache'
      - '/urlcache'
      - '-decode'
      - '/decode'
      - '-decodehex'
      - '/decodehex'
      - 'urlcache -split'
  condition: selection
fields:
  - process.command_line
  - process.parent.executable
falsepositives:
  - PKI / CA administrators using certutil for genuine work — combine with parent context.
level: high
