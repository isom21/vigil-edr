title: Repeated authentication failures consistent with password spray
id: b5c63725-f15b-4bd9-a6fd-6fedb0fb829d
status: experimental
description: |
  T1110.003 — Password Spraying — fingerprint: many 4625 (Failed
  Logon) events with status 0xC000006A (wrong password) within a
  short window. The sigma engine handles the count-and-time aggregation
  via the `timeframe` / `count by` semantics; the on-disk rule pins
  the predicate and lets operators tune the threshold per environment.
references:
  - https://attack.mitre.org/techniques/T1110/003/
author: edr-curated
date: 2026-05-13
tags:
  - attack.credential_access
  - attack.t1110.003
logsource:
  product: windows
  service: security
detection:
  selection:
    event.code: '4625'
    winlog.event_data.Status: '0xC000006A'
    winlog.event_data.SubStatus: '0xC000006A'
  condition: selection
fields:
  - user.name
  - source.ip
  - winlog.event_data.WorkstationName
falsepositives:
  - Application service-account password rotation typos.
  - Bulk password resets after a corporate-wide policy change.
level: medium
