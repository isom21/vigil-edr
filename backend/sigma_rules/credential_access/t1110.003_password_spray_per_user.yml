title: Password spray — many users failing from a single source IP
id: ee912000-20cb-4fbf-aa83-661e4998dad2
status: experimental
description: |
  T1110.003 — Password Spraying — distinguishable from per-account
  brute force by the cardinality of *targets*: many distinct
  usernames failing 4625 from the same source IP within a short
  window. Tune the threshold to your auth baseline.
references:
  - https://attack.mitre.org/techniques/T1110/003/
author: edr-curated
date: 2026-05-13
tags:
  - attack.credential_access
  - attack.t1110.003
logsource:
  product: windows
  service: security
detection:
  selection:
    event.code: '4625'
    winlog.event_data.Status: '0xC000006A'
  condition: selection
# Cardinality threshold note: the on-disk rule fingerprints a single
# 4625 wrong-password failure. The "many distinct usernames per source
# IP" envelope is applied by the sigma scheduler's count-and-time
# wrapper — Sigma's pipe-aggregation syntax is deprecated in pySigma.
fields:
  - source.ip
  - user.name
  - winlog.event_data.WorkstationName
falsepositives:
  - Egress NAT collapsing many real users behind one IP — tune by source subnet.
  - Misconfigured service accounts with expired passwords (a few users, not dozens).
level: high
