title: Process reading a web browser credential store
id: af2c2e46-e04b-40e7-b48a-20161b1344e6
status: experimental
description: |
  T1555.003 — Credentials from Web Browsers — info-stealers (RedLine,
  Vidar, Lumma, StealC) all read Chrome / Edge / Firefox credential
  databases directly off disk. Browsers self-open these files; any
  *other* process touching them is suspicious. False positives are
  rare because few non-browser tools have a reason to read
  `Login Data` / `logins.json` / `Cookies`.
references:
  - https://attack.mitre.org/techniques/T1555/003/
author: edr-curated
date: 2026-05-13
tags:
  - attack.credential_access
  - attack.t1555.003
logsource:
  category: file_event
  product: windows
detection:
  selection_paths:
    file.path|contains:
      - '\Google\Chrome\User Data\Default\Login Data'
      - '\Google\Chrome\User Data\Default\Cookies'
      - '\Google\Chrome\User Data\Default\Web Data'
      - '\Microsoft\Edge\User Data\Default\Login Data'
      - '\Mozilla\Firefox\Profiles\'
      - '\logins.json'
      - '\key4.db'
      - '\cookies.sqlite'
  filter_browser:
    process.executable|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\firefox.exe'
      - '\brave.exe'
      - '\opera.exe'
  condition: selection_paths and not filter_browser
fields:
  - file.path
  - process.executable
  - user.name
falsepositives:
  - Browser backup utilities (1Password, Bitwarden importers) — pin those by hash.
level: high
