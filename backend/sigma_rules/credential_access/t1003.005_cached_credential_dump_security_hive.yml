title: Registry SECURITY hive opened — cached-credential dump
id: 2c2a8b2f-b198-4298-b49b-3d6e8b3887a3
status: experimental
description: |
  T1003.005 — OS Credential Dumping — Cached Domain Credentials —
  the SECURITY hive holds the LSA secrets and cached MSCACHEv2
  hashes that an attacker needs for offline cracking of last-logged-
  on domain users. Legitimate dumps via `reg save HKLM\SECURITY` or
  `secretsdump.py` always touch the hive. Security event 4663 with
  an ObjectName ending in `SECURITY` and a non-system caller is the
  fingerprint.
references:
  - https://attack.mitre.org/techniques/T1003/005/
author: edr-curated
date: 2026-05-13
tags:
  - attack.credential_access
  - attack.t1003.005
logsource:
  product: windows
  service: security
detection:
  selection:
    event.code: '4663'
    winlog.event_data.ObjectType: 'Key'
    winlog.event_data.ObjectName|endswith:
      - '\REGISTRY\MACHINE\SECURITY'
      - '\REGISTRY\MACHINE\SECURITY\Policy\Secrets'
      - '\REGISTRY\MACHINE\SECURITY\Cache'
  filter_system:
    winlog.event_data.SubjectUserName|endswith: '$'
  condition: selection and not filter_system
fields:
  - winlog.event_data.SubjectUserName
  - winlog.event_data.ProcessName
  - winlog.event_data.ObjectName
  - winlog.event_data.AccessMask
falsepositives:
  - Backup / DR tooling that snapshots the registry (whitelist by ProcessName).
  - System tuning utilities that audit LSA policy.
level: high
