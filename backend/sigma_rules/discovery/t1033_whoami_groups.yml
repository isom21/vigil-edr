title: Group membership enumeration via whoami /groups
id: c7c5c358-54d7-498d-b982-284a32b94e8a
status: experimental
description: |
  T1033 — System Owner / User Discovery — `whoami /groups` enumerates
  every group SID the current token belongs to (Domain Admins, etc.).
  This is the canonical "what does my account get me?" check after
  initial access.
references:
  - https://attack.mitre.org/techniques/T1033/
author: edr-curated
date: 2026-05-13
tags:
  - attack.discovery
  - attack.t1033
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    process.name|endswith: 'whoami.exe'
    process.command_line|contains: '/groups'
  condition: selection
fields:
  - process.command_line
  - process.parent.executable
  - user.name
falsepositives:
  - Helpdesk and operator-driven access reviews.
  - User self-service scripts.
level: low
