title: Account added to Domain Admins / Enterprise Admins
id: d3ba3c36-042b-4b99-a55b-e152707b1c9a
status: experimental
description: |
  T1136.002 — Create Account — Domain Account — additions to the
  highly-privileged domain groups are the canonical "Tier 0 just
  changed" signal. 4728 (member added to global group) on
  Domain Admins / Enterprise Admins / Schema Admins is rare in
  steady-state; an off-hours or service-account-attributed
  addition should always page someone. Pair with the existing
  T1098 admin-group rule for broader local-group coverage.
references:
  - https://attack.mitre.org/techniques/T1136/002/
author: edr-curated
date: 2026-05-13
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1136.002
logsource:
  product: windows
  service: security
detection:
  selection:
    event.code: '4728'
    winlog.event_data.TargetUserName:
      - 'Domain Admins'
      - 'Enterprise Admins'
      - 'Schema Admins'
  condition: selection
fields:
  - winlog.event_data.SubjectUserName
  - winlog.event_data.TargetUserName
  - winlog.event_data.MemberName
  - winlog.event_data.MemberSid
falsepositives:
  - Planned Tier 0 admin onboarding (catch with ticket-system correlation).
level: critical
