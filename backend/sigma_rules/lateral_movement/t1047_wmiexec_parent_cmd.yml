title: cmd.exe spawned by WmiPrvSE — wmiexec-style lateral movement
id: 7dfcea8a-36ae-42c1-9216-a0f0e7a7ed7f
status: experimental
description: |
  T1047 — WMI — Impacket's wmiexec.py and equivalents land on the
  target by asking WmiPrvSE.exe to spawn cmd.exe with the operator's
  command and stdout-to-share redirect. WmiPrvSE → cmd is normal on
  AD servers; combined with `/Q /c` plus a redirect it's lateral
  movement.
references:
  - https://attack.mitre.org/techniques/T1047/
author: edr-curated
date: 2026-05-13
tags:
  - attack.lateral_movement
  - attack.t1047
logsource:
  category: process_creation
  product: windows
detection:
  selection_parent:
    process.parent.name|endswith: 'WmiPrvSE.exe'
  selection_child:
    process.name|endswith: 'cmd.exe'
  selection_args:
    process.command_line|contains:
      - '/Q /c'
      - '2>&1'
      - '\\\\127.0.0.1\\ADMIN$'
  condition: selection_parent and selection_child and selection_args
fields:
  - process.command_line
  - process.parent.executable
  - user.name
falsepositives:
  - Legitimate remote administration via Impacket / wmiexec in IT runbooks (whitelist).
level: high
