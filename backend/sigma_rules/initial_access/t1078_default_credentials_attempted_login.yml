title: Login attempt with well-known default username
id: 0b7bf770-2645-4356-8e98-91ec22b3c41d
status: experimental
description: |
  Failed authentication using a common default / built-in account
  name. Auto-rotating credential scanners hit these constantly; a
  burst from a single source is a strong T1078.001 indicator. Pair
  with the password-spray rule (T1110.003) for full coverage of
  the spray + default-creds attack pattern.
references:
  - https://attack.mitre.org/techniques/T1078/001/
author: edr-curated
date: 2026-05-13
tags:
  - attack.initial_access
  - attack.t1078.001
logsource:
  product: windows
  service: security
detection:
  selection:
    event.code: '4625'
    winlog.event_data.TargetUserName|contains:
      - 'admin'
      - 'administrator'
      - 'root'
      - 'sa'
      - 'guest'
      - 'oracle'
      - 'postgres'
      - 'mysql'
      - 'test'
  condition: selection
fields:
  - user.name
  - source.ip
  - host.name
falsepositives:
  - Operator who fat-fingers a password on their actual `Administrator` account once or twice.
level: medium
