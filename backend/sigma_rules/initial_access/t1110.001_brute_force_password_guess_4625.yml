title: Repeated 4625 failed-logon events from same source — password brute force
id: 1e9744f2-d2e6-4a4c-ac4e-073e368bfff7
status: experimental
description: |
  T1110.001 — Brute Force — Password Guessing — a sustained stream
  of 4625 (Failed Logon) events with status 0xC000006A (bad
  password) from the same SubjectUserName / IpAddress against
  multiple TargetUserName values. Distinct from password spraying
  (one password / many users): this is many passwords / few users.
  The sigma engine handles the count + groupby aggregation; the
  on-disk rule pins the predicate.
references:
  - https://attack.mitre.org/techniques/T1110/001/
author: edr-curated
date: 2026-05-13
tags:
  - attack.credential_access
  - attack.initial_access
  - attack.t1110.001
logsource:
  product: windows
  service: security
detection:
  selection:
    event.code: '4625'
    winlog.event_data.Status: '0xC000006A'
  filter_machine_account:
    winlog.event_data.TargetUserName|endswith: '$'
  condition: selection and not filter_machine_account
fields:
  - winlog.event_data.TargetUserName
  - winlog.event_data.IpAddress
  - winlog.event_data.WorkstationName
  - winlog.event_data.LogonType
falsepositives:
  - User who has just rotated their password and forgotten the new one.
  - Scripts that authenticate with a stale cached credential.
level: medium
